# Production deploy to GitHub Pages from main (§9).
# Publishes the static site (no build step — static ES modules, §0) to the ROOT
# of the gh-pages branch so it coexists with PR previews under pr-preview/
# (pr-preview.yml). GitHub Pages serves a single source; using "Deploy from a
# branch" (gh-pages) is the source the preview action requires, so production
# and previews stay green from one source instead of fighting over it.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Push the published site to the gh-pages branch.
permissions:
  contents: write

# Serialize production deploys; don't cancel an in-progress one.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          # The whole repo is the site; everything needed is static.
          publish_dir: .
          # Keep the pr-preview/ subtree (and anything else) already on the
          # branch — only the production files at the root are overwritten.
          keep_files: true
